<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Resume — Christine Chang</title>
<meta name="description" content="Resume of Christine Chang, Senior Product Designer with 8+ years across streaming, e-commerce, and ed-tech."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;700;800&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; font-size: 16px; }

  :root {
    --blue-primary:    #1A6E9F;
    --blue-button:     #3BB2E4;
    --blue-light:      #E8F2F8;
    --blue-tint:       #DFF1FB;
    --color-heading:   #1C1C1C;
    --color-body:      #2D3748;
    --color-secondary: #6B7280;
    --bg:              #FAF9F6;
    --card:            #FFFFFF;
    --border:          #E8E4DC;
  }

  body {
    background-color: var(--bg);
    color: var(--color-heading);
    font-family: 'Open Sans', sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: relative;
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 48px;
    z-index: 100;
  }
  .nav-logo { display: flex; align-items: center; text-decoration: none; flex-shrink: 0; }
  .nav-links-wrap {
    position: fixed; top: 12px; right: 48px; z-index: 1000;
    display: flex; align-items: center;
    background: rgba(255,255,255,0.85);
    border: 1px solid rgba(28,28,28,0.10);
    border-radius: 9999px; padding: 4px 4px 4px 10px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    transition: opacity 0.4s ease;
  }
  .nav-links-wrap.nav-faded { opacity: 0.45; }
  .nav-links-wrap.nav-faded:hover { opacity: 1; }
  #nav-pill {
    position: absolute; top: 50%; transform: translateY(-50%) translateX(0);
    height: 32px; background: var(--blue-light);
    border: 1.5px solid var(--blue-button); border-radius: 9999px;
    pointer-events: none; transition: transform 0.3s ease, width 0.3s ease, opacity 0.2s;
    opacity: 0; left: 0; width: 60px;
  }
  .nav-links { display: flex; align-items: center; gap: 4px; list-style: none; position: relative; }
  .nav-links li a {
    font-family: 'Open Sans', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; color: var(--color-heading);
    text-decoration: none; padding: 6px 14px; border-radius: 9999px;
    min-height: 44px; display: flex; align-items: center;
    transition: color 0.2s; white-space: nowrap;
  }
  .nav-links li a:hover, .nav-links li a.active { color: var(--blue-primary); }
  .nav-icon { display: flex; align-items: center; color: #9CA3AF; padding: 6px 8px; min-height: 44px; border-radius: 9999px; transition: color 0.2s; }
  .nav-icon:hover { color: var(--blue-primary); }
  .nav-icon svg { width: 18px; height: 18px; }
  .nav-hamburger {
    display: none; position: fixed; top: 12px; right: 20px; z-index: 1000;
    background: rgba(255,255,255,0.85); border: 1px solid rgba(28,28,28,0.10);
    border-radius: 9999px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    cursor: pointer; padding: 0; width: 44px; height: 44px;
    color: var(--color-heading); align-items: center; justify-content: center;
  }
  .icon-close { display: none; }
  .nav-hamburger.open .icon-hamburger { display: none; }
  .nav-hamburger.open .icon-close { display: block; }
  .mobile-nav {
    display: flex; position: fixed; inset: 0; background: var(--bg); z-index: 200;
    flex-direction: column; align-items: center; justify-content: space-between;
    padding: 80px 0 56px;
    opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s;
  }
  .mobile-nav.open { opacity: 1; visibility: visible; }
  .mobile-nav-links { display: flex; flex-direction: column; align-items: center; gap: 40px; flex: 1; justify-content: center; }
  .mobile-nav-links a { font-family: 'Raleway', sans-serif; font-size: 32px; font-weight: 700; color: var(--color-heading); text-decoration: none; min-height: 44px; display: flex; align-items: center; }
  .mobile-nav-icons { display: flex; gap: 32px; align-items: center; }
  .mobile-nav-icons a { color: var(--color-secondary); display: flex; align-items: center; justify-content: center; min-height: 44px; min-width: 44px; transition: color 0.2s; }
  .mobile-nav-icons a:hover { color: var(--color-heading); }
  .mobile-nav-icons svg { width: 22px; height: 22px; }
  .mobile-nav-close { position: absolute; top: 20px; right: 24px; background: none; border: none; cursor: pointer; font-size: 28px; color: var(--color-heading); min-height: 44px; width: 44px; display: flex; align-items: center; justify-content: center; }

  /* ── RESUME PAGE ── */
  .resume-page {
    max-width: 1280px;
    margin: 0 auto;
    padding: 48px 48px 80px;
  }

  .resume-header {
    margin-bottom: 40px;
  }

  .resume-title {
    font-family: 'Raleway', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 4vw, 48px);
    color: var(--color-heading);
  }

  /* Support text (mobile-only) */
  .resume-support-text {
    display: none;
    font-size: 15px;
    color: var(--color-body);
    line-height: 1.7;
    margin-top: 16px;
  }

  /* Mobile-only open button */
  .mobile-open-btn {
    display: none;
    align-items: center;
    gap: 8px;
    background: var(--blue-primary);
    color: #fff;
    font-family: 'Open Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 16px 32px;
    border-radius: 9999px;
    text-decoration: none;
    transition: background 0.2s, transform 0.2s;
    white-space: nowrap;
    min-height: 44px;
    margin-top: 24px;
  }
  .mobile-open-btn:hover { background: #155d87; transform: translateY(-1px); }
  .mobile-open-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  .resume-embed-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .resume-embed-wrap iframe {
    display: block;
    width: 100%;
    height: 80vh;
    border: none;
  }

  .resume-fallback {
    display: none;
    padding: 40px;
    text-align: center;
    font-size: 15px;
    color: var(--color-body);
    line-height: 1.7;
  }
  .resume-fallback a { color: var(--blue-primary); font-weight: 600; }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 36px 48px;
    display: flex; align-items: center; justify-content: space-between;
    max-width: 1280px; margin: 0 auto;
  }
  .footer-text { font-size: 13px; font-weight: 400; color: var(--color-secondary); }
  .footer-links { display: flex; gap: 24px; }
  .footer-links a { font-size: 13px; font-weight: 600; color: var(--color-secondary); text-decoration: none; transition: color 0.2s; min-height: 44px; display: flex; align-items: center; }
  .footer-links a:hover { color: var(--color-heading); }

  /* ── SKIP LINK ── */
  .skip-link { position: absolute; top: -40px; left: 8px; background: var(--blue-primary); color: #fff; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; z-index: 2000; transition: top 0.2s ease; }
  .skip-link:focus { top: 8px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 1024px) {
    nav { padding: 24px; }
    .resume-page { padding-left: 24px; padding-right: 24px; }
    footer { padding-left: 24px; padding-right: 24px; }
  }

  @media (max-width: 768px) {
    .nav-links-wrap { display: none; }
    .nav-hamburger { display: flex; }
    /* Hide PDF embed on mobile — show open button instead */
    .resume-embed-wrap { display: none; }
    .resume-support-text { display: block; }
    .mobile-open-btn { display: inline-flex; }
    .resume-header { text-align: center; display: flex; flex-direction: column; align-items: center; }
  }

  @media (max-width: 640px) {
    .resume-page { padding-left: 20px; padding-right: 20px; padding-top: 32px; }
    footer { padding: 24px 20px; flex-direction: column; gap: 16px; text-align: center; }
  }

  /* ── REDUCED MOTION ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
  }
</style>
</head>

<script>
  // Sliding nav pill
  const pill = document.getElementById('nav-pill');
  const navLinksEl = document.querySelector('.nav-links');
  const navWrapEl = pill.parentElement;

  function movePillTo(linkEl) {
    if (!linkEl) { pill.style.opacity = '0'; return; }
    const wrapRect = navWrapEl.getBoundingClientRect();
    const borderLeft = parseFloat(getComputedStyle(navWrapEl).borderLeftWidth) || 0;
    const linkRect = linkEl.getBoundingClientRect();
    const offsetX = linkRect.left - wrapRect.left - borderLeft;
    pill.style.width = linkRect.width + 'px';
    pill.style.height = linkRect.height + 'px';
    pill.style.transform = 'translateY(-50%) translateX(' + offsetX + 'px)';
    pill.style.opacity = '1';
  }

  navLinksEl.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => movePillTo(link));
    link.addEventListener('mouseenter', () => movePillTo(link));
  });
  navLinksEl.addEventListener('mouseleave', () => {
    const active = navLinksEl.querySelector('a.active');
    if (active) movePillTo(active); else pill.style.opacity = '0';
  });

  // Show pill on active link at load
  window.addEventListener('load', () => {
    const active = navLinksEl.querySelector('a.active');
    if (active) movePillTo(active);
  });

  // Nav fade on scroll
  const navWrap = document.querySelector('.nav-links-wrap');
  window.addEventListener('scroll', () => {
    navWrap.classList.toggle('nav-faded', window.scrollY > 60);
  }, { passive: true });

  // Mobile nav
  const hamburger = document.getElementById('hamburger');
  hamburger.addEventListener('click', () => {
    const isOpen = document.getElementById('mobileNav').classList.contains('open');
    if (isOpen) { closeMobileNav(); } else { openMobileNav(); }
  });
  document.getElementById('mobileClose').addEventListener('click', closeMobileNav);
  function openMobileNav() {
    document.getElementById('mobileNav').classList.add('open');
    hamburger.classList.add('open');
  }
  function closeMobileNav() {
    document.getElementById('mobileNav').classList.remove('open');
    hamburger.classList.remove('open');
  }
</script>
